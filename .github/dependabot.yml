version: 2

updates:
  # Maven dependencies (root + all modules)
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
    ignore:
      # elasticsearch-java 9.x requires JDK 17; this project targets Java 11.
      # Stay on 8.x until the project raises its Java baseline to 17.
      - dependency-name: "co.elastic.clients:elasticsearch-java"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
